name: Daily Engine (Content Generation + Publishing)

on:
  schedule:
    # 日次 7:00 JST = 22:00 UTC (前日)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Collect Trends (latest)
        run: npm run collect-trends
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}

      - name: Collect arXiv Papers
        run: npm run collect-arxiv
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Analyze and Plan
        run: npm run analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate Content
        run: npm run generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Publish to note.com
        continue-on-error: true
        run: npm run publish-note
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}

      - name: Publish to X
        continue-on-error: true
        run: npm run publish-x
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}

      - name: Send Daily Report
        run: npm run notify
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Commit all data
        run: |
          git config user.name "radineer-bot"
          git config user.email "bot@radineer.co.jp"
          git add data/
          git diff --staged --quiet || git commit -m "chore: daily engine run $(date -u +%Y-%m-%d)"
          git push
